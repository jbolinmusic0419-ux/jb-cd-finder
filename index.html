<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JB CD Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui; background: #0b1020; color: white; display: flex; justify-content: center; padding-top: 50px; }
  .container { max-width: 600px; width: 90%; background: #151a2c; padding: 24px; border-radius: 12px; }
  input, select, textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; background: #101426; color: #fff; }
  button { margin-top: 20px; padding: 10px 20px; border-radius: 999px; background: #4f46e5; color: white; border: none; cursor: pointer; }
  a { color: #7dd3fc; }
</style>
</head>
<body>
<div class="container">
  <h1>JB CD Finder</h1>
  <div id="app"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxX1DpFmSe3msmr4gsPEYfZZK1yzTo7GbB0E7YiVxIbRwmiIqfMT5Rj2VGvhj3FrSXu/exec";
let step = 0;
let feedbackStep = 0;
let builtResults = [];
const answers = {};
const feedback = {};

const questions = [
  { id: "firstName", text: "First, what's your first name?", type: "text", placeholder: "Johnny" },
  { id: "email", text: "What email should I send your CD matches to?", type: "email", placeholder: "you@example.com" },
  { id: "amountChoice", text: "How much do you want to invest in CDs?", type: "select", options: ["$500", "$1,000", "$5,000", "$10,000+"] },
  { id: "timeframe", text: "How long can you leave the money in a CD?", type: "select", options: ["3 months", "6 months", "12 months", "18+ months"] },
  { id: "mindeposit", text: "What's the minimum deposit you're comfortable with?", type: "select", options: ["$500", "$1,000", "$5,000", "No preference"] },
  { id: "currentrate", text: "What rate are you earning now (roughly)?", type: "select", options: ["I'm not sure", "1%", "2%", "3%", "4%+", "I'm just in cash"] },
  { id: "penalty", text: "How important is a low early withdrawal penalty?", type: "select", options: ["Not important", "Somewhat important", "Very important"] },
  { id: "addon", text: "Would you like to add more money over time if allowed?", type: "select", options: ["Yes", "No", "Not sure"] },
  { id: "numresults", text: "How many CD options would you like?", type: "select", options: ["3", "5", "10"] }
];

const feedbackQuestions = [
  { id: "rating", text: "How helpful were these CD matches?", type: "select", options: ["1","2","3","4","5"] },
  { id: "feedback", text: "Anything you wish this tool did better?", type: "textarea" },
  { id: "recommend", text: "Would you recommend this tool to a friend?", type: "select", options: ["Yes","No","Not sure"] }
];

const app = document.getElementById("app");

function renderQuestion() {
  const q = questions[step];
  let inputHtml = "";
  if(q.type==="text" || q.type==="email") inputHtml = `<input id="val" type="${q.type}" placeholder="${q.placeholder||''}"/>`;
  if(q.type==="select") inputHtml = `<select id="val"><option value="">Select</option>${q.options.map(o=>`<option>${o}</option>`).join("")}</select>`;
  app.innerHTML = `<div>${q.text}</div>${inputHtml}<button onclick="next()">Next</button>`;
}

function next() {
  const val = document.getElementById("val").value;
  if(!val) return;
  answers[questions[step].id] = val;
  if(step<questions.length-1){ step++; renderQuestion(); }
  else buildResults();
}

function buildResults() {
  const baseResults = [
    { bank: "Ally Bank", term: "12 months", min: 0, link: "https://www.ally.com/bank/cd/" },
    { bank: "Capital One", term: "12 months", min: 0, link: "https://www.capitalone.com/bank/cds/" },
    { bank: "Synchrony Bank", term: "12 months", min: 0, link: "https://www.synchronybank.com/banking/cds/" },
    { bank: "Marcus by Goldman Sachs", term: "12 months", min: 500, link: "https://www.marcus.com/us/en/savings/high-yield-cds" },
    { bank: "Citi", term: "12 months", min: 500, link: "https://online.citi.com/US/ag/cdit/cds" }
  ];
  const desiredCount = parseInt(answers.numresults.replace(/\D/g,"")||5);
  builtResults = baseResults.slice(0,desiredCount);
  const name = answers.firstName || "you";
  app.innerHTML = `<div>Here are CD options for ${name}:</div>
    <ul>${builtResults.map(r=>`<li>${r.bank} - ${r.term} - Min $${r.min} <a href="${r.link}" target="_blank">View</a></li>`).join("")}</ul>
    <button onclick="startFeedback()">Continue</button>`;
}

function startFeedback(){ feedbackStep=0; renderFeedback(); }

function renderFeedback() {
  const q = feedbackQuestions[feedbackStep];
  let inputHtml = q.type==="textarea"?`<textarea id="val"></textarea>`:`<select id="val"><option value="">Select</option>${q.options.map(o=>`<option>${o}</option>`).join("")}</select>`;
  app.innerHTML = `<div>${q.text}</div>${inputHtml}<button onclick="nextFeedback()">Next</button>`;
}

function nextFeedback() {
  const val = document.getElementById("val").value;
  if(!val && feedbackQuestions[feedbackStep].type!=="textarea") return;
  feedback[feedbackQuestions[feedbackStep].id]=val;
  if(feedbackStep<feedbackQuestions.length-1){feedbackStep++; renderFeedback(); }
  else submitAll();
}

function submitAll() {
  const payload = { answers, feedback, results: builtResults, firstName: answers.firstName, email: answers.email };
  fetch(URL,{method:"POST",body:JSON.stringify(payload)})
    .then(r=>r.text())
    .then(res=>app.innerHTML="<h3>Done ✔ Check your email</h3>")
    .catch(err=>app.innerHTML="<h3>Error sending</h3>");
}

renderQuestion();
</script>
</body>
</html>
